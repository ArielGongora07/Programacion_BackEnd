<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>TacosMx</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>Tacoschidos 🌮</h1>

    <form id="Form" class="buttons">
      <button type="button" data-type="Puerco">
        🐷
        <span style="font-size: 1rem; color: #555">Puerco</span>
      </button>

      <button type="button" data-type="Pollo">
        🐔
        <span style="font-size: 1rem; color: #555">Pollo</span>
      </button>

      <button type="button" data-type="Res">
        🐮
        <span style="font-size: 1rem; color: #555">Res</span>
      </button>

      <button type="button" data-type="Cerdo">
        🌮
        <span style="font-size: 1rem; color: #555">Cerdo</span>
      </button>
    </form>

    <!-- CONTENEDOR -->
    <div id="Container"></div>

    <!-- SCRIPT -->
    <script>
      document.querySelectorAll("#Form button").forEach((button) => {
        button.addEventListener("click", async (event) => {
          const type = event.target.getAttribute("data-type").toLowerCase();

          const response = await fetch(`/receta/${type}`);
          const receta = await response.json();

          const contenedor = document.getElementById("Container");
          if (receta.error) {
            contenedor.innerHTML = "<h2>Receta no encontrada</h2>"; //si no se recupera el contenido HTML de un elemento.
          } else {
            contenedor.innerHTML = `
            <h2>${receta.nombre}</h2> 
            <h3>Ingredientes:</h3>
            <ul id="ingredientesLista">
              <li>Carne de: ${receta.ingredientes.proteina.nombre}, Modo preparación: ${receta.ingredientes.proteina.preparacion}</li>
              <li> Salsa: ${receta.ingredientes.salsa.nombre} (${receta.ingredientes.salsa.picor})</li>
              ${receta.acompañamientos.map((acompañamiento) => `<li> Acompañamiento: ${acompañamiento.cantidad} : ${acompañamiento.nombre}</li>`).join("")}</ul>`;
          }
        });
      });
    </script>
  </body>
</html>
